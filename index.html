<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>E621 Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&family=Source+Serif+4:wght@300;400;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f2f2f2; --surface:#ffffff; --text:#111111; --text2:#555555; --text3:#999999;
  --danger:#cc2222; --accent:#2255cc;
  --tag-artist:#8b3a00; --tag-copy:#5500aa; --tag-char:#006644;
  --tag-species:#003d99; --tag-general:#1a5c00; --tag-meta:#444444;
  --font-ui:'IBM Plex Sans',sans-serif; --font-mono:'IBM Plex Mono',monospace; --thumb:180px;
  --radius:3px;
}
:root.dark {
  --bg:#141414; --surface:#1e1e1e; --text:#eeeeee; --text2:#aaaaaa; --text3:#666666;
  --danger:#ff6666; --accent:#6699ff;
  --tag-artist:#ffaa55; --tag-copy:#cc88ff; --tag-char:#44ddaa;
  --tag-species:#66aaff; --tag-general:#66cc44; --tag-meta:#bbbbbb;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{background:var(--bg);}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:14px;min-height:100vh;}

/* LOGIN */
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:var(–surface);padding:44px 40px;width:100%;max-width:420px;position:relative;border-radius:var(–radius);}
.login-title{font-size:22px;font-weight:700;margin-bottom:6px;letter-spacing:-0.5px;}
.login-sub{font-size:12px;color:var(–text2);margin-bottom:32px;line-height:1.8;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:10px;color:var(–text3);margin-bottom:7px;font-family:var(–font-mono);text-transform:uppercase;letter-spacing:1px;}
.field input{width:100%;padding:11px 14px;background:var(–bg);border:1px solid transparent;font-family:var(–font-mono);font-size:13px;color:var(–text);outline:none;border-radius:var(–radius);}
.field input:focus{border-color:var(–text3);}
.remember-row{display:flex;align-items:center;gap:8px;}
.remember-row input{width:auto;}
.remember-row label{font-size:12px;color:var(–text2);cursor:pointer;}
.btn-login{width:100%;padding:13px;background:var(–text);color:var(–bg);border:none;font-family:var(–font-ui);font-size:14px;font-weight:700;cursor:pointer;margin-top:22px;border-radius:var(–radius);letter-spacing:0.3px;}
.btn-login:active{opacity:0.8;}
.login-error{font-size:12px;color:var(–danger);margin-top:10px;display:none;font-family:var(–font-mono);}
.login-ver{position:absolute;bottom:14px;right:18px;font-size:10px;font-family:var(–font-mono);opacity:0.4;line-height:1.6;}

/* APP */
#appPage{display:none;}
header{height:52px;display:flex;align-items:center;padding:0 14px;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(128,128,128,0.1);}
.header-left{display:flex;align-items:center;gap:4px;}
.logo{font-family:var(–font-mono);font-size:13px;font-weight:600;letter-spacing:0.5px;}
.header-right{display:flex;gap:2px;align-items:center;}
.icon-btn{background:none;border:none;cursor:pointer;padding:7px;display:flex;align-items:center;justify-content:center;border-radius:var(–radius);font-size:17px;line-height:1;}
.icon-btn:hover{background:rgba(128,128,128,0.12);}
.username-badge{font-family:var(–font-mono);font-size:11px;margin-right:4px;padding:4px 8px;border-radius:var(–radius);}

/* TABS */
.tabs{display:flex;padding:0 14px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid rgba(128,128,128,0.12);}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:11px 13px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;background:none;border:none;border-bottom:2px solid transparent;font-family:var(–font-ui);display:flex;align-items:center;gap:5px;letter-spacing:0.2px;}

/* MAIN */
.main{padding:16px;max-width:1400px;margin:0 auto;}

/* SEARCH */
.search-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.search-wrap{flex:1;min-width:180px;position:relative;}
.search-input{width:100%;padding:10px 13px;border:none;font-family:var(–font-mono);font-size:13px;outline:none;border-radius:var(–radius);}
.search-input::placeholder{opacity:0.4;}
.autocomplete-box{position:absolute;top:calc(100% + 2px);left:0;right:0;z-index:50;max-height:240px;overflow-y:auto;display:none;box-shadow:0 6px 24px rgba(0,0,0,0.18);border-radius:var(–radius);border:1px solid rgba(128,128,128,0.15);}
.autocomplete-box.open{display:block;}
.ac-item{padding:9px 13px;font-size:12px;font-family:var(–font-mono);cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.ac-item:hover,.ac-item.selected{filter:brightness(0.9);}
.ac-count{font-size:10px;opacity:0.5;}
.btn-main{padding:10px 18px;border:none;font-family:var(–font-ui);font-size:13px;font-weight:600;cursor:pointer;border-radius:var(–radius);}

/* CHIPS */
.filter-row{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.filter-label{font-size:10px;font-family:var(–font-mono);letter-spacing:0.8px;text-transform:uppercase;margin-right:2px;}
.chip{padding:5px 11px;font-size:11px;cursor:pointer;border:1px solid transparent;font-family:var(–font-mono);border-radius:var(–radius);font-weight:500;}
.divider{width:1px;height:18px;background:rgba(128,128,128,0.25);margin:0 5px;}

/* GRID */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(–thumb),1fr));gap:8px;}
.post-card{cursor:pointer;position:relative;border-radius:var(–radius);overflow:hidden;border:1px solid rgba(128,128,128,0.15);transition:transform 0.1s,box-shadow 0.1s;}
.post-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.15);}
.post-thumb{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;}
.post-ph{width:100%;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;font-size:11px;font-family:var(–font-mono);background:rgba(128,128,128,0.1);}
.post-footer{padding:6px 9px;display:flex;justify-content:space-between;align-items:center;}
.post-score{font-size:11px;font-family:var(–font-mono);}
.post-bkmk{background:none;border:none;cursor:pointer;font-size:14px;padding:0 2px;line-height:1;}
.post-bkmk:hover{transform:scale(1.2);}
.badge{position:absolute;font-size:9px;padding:2px 5px;font-family:var(–font-mono);color:#fff;border-radius:2px;}
.b-seen{top:5px;right:5px;background:rgba(0,0,0,0.5);}
.b-vid{top:5px;left:5px;background:rgba(0,0,0,0.6);}
.b-rating{bottom:30px;left:5px;}
.b-s{background:rgba(20,120,20,0.8);}
.b-q{background:rgba(160,120,0,0.8);}
.b-e{background:rgba(160,20,20,0.8);}

/* BACK BTN */
.btn-back{background:none;border:none;cursor:pointer;padding:7px;display:none;align-items:center;justify-content:center;border-radius:var(–radius);font-size:17px;}
.btn-back.visible{display:flex;}
.btn-back:hover{background:rgba(128,128,128,0.12);}

/* PAGINATION */
.pagination{display:flex;gap:4px;justify-content:center;margin-top:22px;flex-wrap:wrap;}
.page-btn{padding:6px 12px;border:none;font-family:var(–font-mono);font-size:12px;cursor:pointer;border-radius:var(–radius);}
.page-btn:disabled{opacity:0.3;cursor:not-allowed;}
.page-ell{padding:6px 4px;font-family:var(–font-mono);font-size:12px;opacity:0.4;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:200;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.modal-overlay.open{display:flex;}
.modal{width:100%;max-width:880px;margin:auto;}
.modal-topbar{display:flex;align-items:center;padding:8px 12px;gap:8px;border-bottom:1px solid rgba(128,128,128,0.12);}
.modal-close{border:none;width:36px;height:36px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-radius:var(–radius);}
.modal-media{display:flex;align-items:center;justify-content:center;min-height:200px;max-height:72vh;overflow:hidden;}
.modal-img{max-width:100%;max-height:72vh;object-fit:contain;display:block;cursor:zoom-in;}
.modal-video{max-width:100%;max-height:72vh;display:block;}
.modal-meta{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));border-top:1px solid rgba(128,128,128,0.1);}
.meta-cell{padding:10px 14px;}
.meta-label{font-size:9px;text-transform:uppercase;letter-spacing:0.8px;font-family:var(–font-mono);margin-bottom:3px;opacity:0.5;}
.meta-val{font-size:13px;font-family:var(–font-mono);font-weight:600;}
.modal-body{padding:14px 16px;}
.modal-actions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.action-btn{padding:8px 14px;border:none;font-family:var(–font-ui);font-size:12px;cursor:pointer;font-weight:600;border-radius:var(–radius);display:flex;align-items:center;gap:5px;}
.action-btn:active{opacity:0.7;}

/* TAGS */
.tags-section{display:flex;flex-direction:column;gap:5px;}
.tag-group{border:1px solid rgba(128,128,128,0.18);overflow:hidden;border-radius:var(–radius);}
.tag-group-header{display:flex;align-items:center;justify-content:space-between;padding:8px 13px;cursor:pointer;font-size:10px;font-family:var(–font-mono);font-weight:700;text-transform:uppercase;letter-spacing:1px;user-select:none;}
.tag-group-header:hover{filter:brightness(0.95);}
.tag-group-arrow{font-size:9px;transition:transform 0.15s;display:inline-block;}
.tag-group.collapsed .tag-group-arrow{transform:rotate(-90deg);}
.tag-group.collapsed .tag-list{display:none;}
.tag-list{}
.tag{display:block;padding:7px 14px;font-size:12px;font-family:var(–font-mono);cursor:pointer;border-bottom:1px solid rgba(128,128,128,0.08);}
.tag:last-child{border-bottom:none;}
.tag:hover{text-decoration:underline;opacity:0.8;}
.tag.artist{color:var(–tag-artist);}
.tag.copyright{color:var(–tag-copy);}
.tag.character{color:var(–tag-char);}
.tag.species{color:var(–tag-species);}
.tag.general{color:var(–tag-general);}
.tag.meta{color:var(–tag-meta);}

/* SECTION */
.section-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.section-title{font-size:16px;font-weight:700;letter-spacing:-0.3px;}
.section-sub{font-size:11px;font-family:var(–font-mono);margin-top:4px;opacity:0.55;}

/* PREF BARS */
.pref-bar-wrap{padding:14px 16px;margin-bottom:14px;border-radius:var(–radius);}
.pref-bar-title{font-size:9px;margin-bottom:12px;font-family:var(–font-mono);text-transform:uppercase;letter-spacing:1.2px;opacity:0.5;}
.pref-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.pref-name{font-size:11px;font-family:var(–font-mono);min-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:0.75;}
.pref-track{flex:1;height:3px;background:rgba(128,128,128,0.2);border-radius:2px;}
.pref-fill{height:100%;border-radius:2px;}
.pref-count{font-size:10px;font-family:var(–font-mono);min-width:26px;text-align:right;opacity:0.45;}

/* SETTINGS */
.settings-block{padding:18px 20px;margin-bottom:10px;border-radius:var(–radius);}
.settings-block-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;margin-bottom:16px;font-family:var(–font-mono);opacity:0.45;}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;gap:12px;flex-wrap:wrap;border-bottom:1px solid rgba(128,128,128,0.08);}
.settings-row:last-child{border-bottom:none;}
.settings-label{font-size:13px;}
.settings-val{font-size:12px;font-family:var(–font-mono);opacity:0.5;}
.settings-input{border:none;padding:7px 10px;font-family:var(–font-mono);font-size:12px;outline:none;border-radius:var(–radius);}
.color-swatches{display:flex;gap:6px;}
.swatch{width:24px;height:24px;cursor:pointer;border:2px solid transparent;border-radius:50%;}
.swatch:hover{border-color:var(–text2);}
.swatch.active{border-color:var(–text);}
.btn-save{padding:8px 16px;border:none;font-family:var(–font-ui);font-size:12px;font-weight:600;cursor:pointer;margin-top:10px;border-radius:var(–radius);}
.btn-danger{padding:7px 14px;background:transparent;color:var(–danger);border:1px solid var(–danger);font-family:var(–font-ui);font-size:12px;cursor:pointer;border-radius:var(–radius);}
.btn-danger:hover{background:var(–danger);color:#fff;}

/* MISC */
.empty-state{text-align:center;padding:60px 20px;font-size:13px;font-family:var(–font-mono);opacity:0.4;}
.spinner{display:block;width:24px;height:24px;border:2px solid rgba(128,128,128,0.2);border-top-color:var(–text);border-radius:50%;margin:60px auto;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:8px 20px;font-size:12px;font-family:var(–font-mono);z-index:999;opacity:0;transition:opacity 0.25s;pointer-events:none;white-space:nowrap;border-radius:var(–radius);}
.toast.show{opacity:1;}
@media(max-width:540px){.gallery-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}}
</style>

</head>

<div id="page-browse">
  <div class="search-row">
    <div class="search-wrap">
      <input class="search-input" id="searchInput" placeholder="搜索 tag...">

<script>
var API = 'https://e621.net';
var UA  = 'E621GalleryApp/2.0 (by Blagru on e621)';

var cfg  = { freshRatio:20, pageSize:20, thumbSize:'180px', font:'ibm', dark:false, bgIdx:0 };
var sess = { username:'', apiKey:'' };
var st   = { tab:'browse', ratings:['s'], order:'', page:1, favPage:1 };
window._cache = {};
window._modalTags = [];

var BG_LIGHT = ['#f2f2f2','#f5f0e8','#edf0f4','#eef4ee','#f4f1ec'];
var BG_DARK  = ['#141414','#1a1610','#111518','#111a11','#181510'];
var SURFS_DARK = ['#1e1e1e','#221d15','#181e22','#162016','#201a12'];

// ===== COLORS =====
function getC() {
  var i = cfg.bgIdx;
  var d = cfg.dark;
  return {
    bg:      d ? (BG_DARK[i]   || '#141414') : (BG_LIGHT[i] || '#f2f2f2'),
    surface: d ? (SURFS_DARK[i]|| '#1e1e1e') : '#ffffff',
    text:    d ? '#eeeeee' : '#111111',
    text2:   d ? '#aaaaaa' : '#555555',
    text3:   d ? '#666666' : '#999999',
    accent:  d ? '#6699ff' : '#2255cc',
  };
}

function applyUIColors() {
  var c = getC();
  document.body.style.background = c.bg;
  document.body.style.color = c.text;

  // header
  var h = document.getElementById('appHeader');
  if (h) { h.style.background = c.surface; }
  var tb = document.getElementById('tabsBar');
  if (tb) { tb.style.background = c.surface; }

  // logo
  var logo = document.querySelector('.logo');
  if (logo) logo.style.color = c.text;

  // header btns
  var ub = document.getElementById('headerUser');
  if (ub) { ub.style.color = c.text3; ub.style.background = 'rgba(128,128,128,0.1)'; }
  document.querySelectorAll('.icon-btn').forEach(function(el) { el.style.color = c.text2; });
  var bb = document.getElementById('backBtn');
  if (bb) bb.style.color = c.text2;

  // tabs
  document.querySelectorAll('.tab').forEach(function(el) {
    var on = el.classList.contains('active');
    el.style.color = on ? c.text : c.text3;
    el.style.borderBottomColor = on ? c.accent : 'transparent';
  });

  // chips
  document.querySelectorAll('.chip').forEach(function(el) {
    var on = el.classList.contains('active');
    el.style.background  = on ? c.text : c.surface;
    el.style.color       = on ? c.bg   : c.text2;
    el.style.borderColor = on ? c.text : 'rgba(128,128,128,0.2)';
  });

  // filter labels
  document.querySelectorAll('.filter-label').forEach(function(el) { el.style.color = c.text3; });

  // search
  var si = document.getElementById('searchInput');
  if (si) { si.style.background = c.surface; si.style.color = c.text; }

  // btn-main, btn-save
  document.querySelectorAll('.btn-main,.btn-save').forEach(function(el) { el.style.background = c.text; el.style.color = c.bg; });

  // page btns
  document.querySelectorAll('.page-btn').forEach(function(el) {
    var on = el.classList.contains('current');
    el.style.background = on ? c.text : c.surface;
    el.style.color = on ? c.bg : c.text2;
  });

  // post cards
  document.querySelectorAll('.post-card').forEach(function(el) { el.style.background = c.surface; });
  document.querySelectorAll('.post-footer').forEach(function(el) { el.style.background = c.surface; });
  document.querySelectorAll('.post-score').forEach(function(el) { el.style.color = c.text2; });
  document.querySelectorAll('.post-bkmk').forEach(function(el) {
    var on = el.dataset.bkmk === '1';
    el.style.color = on ? '#f0a500' : c.text3;
  });

  // section
  document.querySelectorAll('.section-title').forEach(function(el) { el.style.color = c.text; });
  document.querySelectorAll('.section-sub').forEach(function(el) { el.style.color = c.text3; });

  // pref bars
  document.querySelectorAll('.pref-bar-wrap').forEach(function(el) { el.style.background = c.surface; });
  document.querySelectorAll('.pref-fill').forEach(function(el) { el.style.background = c.accent; });

  // settings
  document.querySelectorAll('.settings-block').forEach(function(el) { el.style.background = c.surface; });
  document.querySelectorAll('.settings-label').forEach(function(el) { el.style.color = c.text; });
  document.querySelectorAll('.settings-input').forEach(function(el) { el.style.background = c.bg; el.style.color = c.text; });
  var fl = document.getElementById('freshLabel');
  if (fl) fl.style.color = c.text3;

  // tag groups
  document.querySelectorAll('.tag-group-header').forEach(function(el) { el.style.background = c.bg; el.style.color = c.text2; });
  document.querySelectorAll('.tag-list').forEach(function(el) { el.style.background = c.surface; });

  // dark btn label
  var db = document.getElementById('darkBtn');
  if (db) { db.textContent = cfg.dark ? '\u263D' : '\u263C'; db.title = cfg.dark ? '切换浅色' : '切换深色'; db.style.color = c.text2; }
  var dbs = document.getElementById('darkBtnSettings');
  if (dbs) { dbs.style.background = c.text; dbs.style.color = c.bg; dbs.textContent = cfg.dark ? '已开启' : '已关闭'; }
}

function applyModalColors() {
  var c = getC();
  var ov = document.getElementById('modalOverlay');
  var box = document.getElementById('modalBox');
  var topbar = document.getElementById('modalTopbar');
  var media = document.getElementById('modalMedia');
  var meta = document.getElementById('modalMeta');
  var body = document.querySelector('#modalBox .modal-body');
  if (ov)     ov.style.background = c.bg;
  if (box)    box.style.background = c.surface;
  if (topbar) { topbar.style.background = c.surface; topbar.style.color = c.text; }
  if (media)  media.style.background = c.bg;
  if (meta)   { meta.style.background = c.surface; meta.style.color = c.text; }
  if (body)   { body.style.background = c.surface; body.style.color = c.text; }
  var cb = document.getElementById('modalCloseBtn');
  if (cb) { cb.style.background = c.bg; cb.style.color = c.text; }
  var mb = document.getElementById('modalBkmkBtn');
  if (mb) {
    var isB = window._currentPostId && getBookmarks().has(window._currentPostId);
    mb.style.color = isB ? '#f0a500' : c.text3;
  }
  document.querySelectorAll('.meta-label').forEach(function(el) { el.style.color = c.text3; });
  document.querySelectorAll('.meta-val').forEach(function(el) { el.style.color = c.text; });
  document.querySelectorAll('.action-btn').forEach(function(el) { el.style.background = c.bg; el.style.color = c.text; });
  var pid = document.getElementById('modalPostId');
  if (pid) pid.style.color = c.text3;
}

function applyAcColors() {
  var c = getC();
  var box = document.getElementById('acBox');
  if (!box) return;
  box.style.background = c.surface;
  box.querySelectorAll('.ac-item').forEach(function(el) { el.style.background = c.surface; el.style.color = c.text2; });
  box.querySelectorAll('.ac-count').forEach(function(el) { el.style.color = c.text3; });
}

function applyLoginColors() {
  var c = getC();
  var lb = document.querySelector('.login-box');
  if (!lb) return;
  lb.style.background = c.surface;
  lb.querySelectorAll('input').forEach(function(el) { el.style.background = c.bg; el.style.color = c.text; });
  var btn = document.getElementById('loginBtn');
  if (btn) { btn.style.background = c.text; btn.style.color = c.bg; }
  document.querySelector('.login-title').style.color = c.text;
  document.querySelector('.login-sub').style.color = c.text2;
  document.querySelectorAll('.field label').forEach(function(el) { el.style.color = c.text3; });
  document.querySelector('.login-ver').style.color = c.text3;
  document.querySelector('.remember-row label').style.color = c.text2;
}

// ===== AUTH =====
function doLogin() {
  var u = document.getElementById('loginUser').value.trim();
  var k = document.getElementById('loginKey').value.trim();
  var e = document.getElementById('loginError');
  if (!u || !k) { e.textContent = '请填写用户名和 API Key'; e.style.display = 'block'; return; }
  e.style.display = 'none';
  sess = { username:u, apiKey:k };
  if (document.getElementById('loginRemember').checked)
    localStorage.setItem('e621sess', JSON.stringify(sess));
  startApp();
}
function doLogout() {
  sess = { username:'', apiKey:'' };
  localStorage.removeItem('e621sess');
  document.getElementById('appPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  applyLoginColors();
}
function startApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appPage').style.display = 'block';
  document.getElementById('headerUser').textContent = sess.username;
  loadCfg(); applyAll();
  switchTab('browse');
  searchPosts();
}
function tryAutoLogin() {

// ===== API =====
async function apiFetch(ep, params) {
  var url = new URL(API + ep);
  if (params) Object.entries(params).forEach(function(kv) { if (kv[1] !== undefined && kv[1] !== '') url.searchParams.set(kv[0], kv[1]); });
  url.searchParams.set('login', sess.username);
  url.searchParams.set('api_key', sess.apiKey);
  url.searchParams.set('_client', UA);
  var res = await fetch(url.toString());
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}
async function apiPost(ep, body) {
  var url = new URL(API + ep);
  var b = new URLSearchParams(Object.assign({}, body, { login:sess.username, api_key:sess.apiKey, _client:UA }));
  return fetch(url.toString(), { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:b.toString() });
}

// ===== AUTOCOMPLETE =====
var acTimer = null;
document.addEventListener('DOMContentLoaded', function() {
  var inp = document.getElementById('searchInput');
  var box = document.getElementById('acBox');
  var acIdx = -1, acItems = [];

  inp.addEventListener('input', function() {
    clearTimeout(acTimer);
    var last = inp.value.split(/\s+/).pop();
    if (last.length < 2) { box.classList.remove('open'); return; }
    acTimer = setTimeout(async function() {
      try {
        var data = await apiFetch('/tags.json', { 'search[name_matches]':last+'*', 'search[order]':'count', limit:8 });
        acItems = data || []; acIdx = -1;
        if (!acItems.length) { box.classList.remove('open'); return; }
        box.innerHTML = acItems.map(function(t, i) {
          return '<div class="ac-item" data-i="'+i+'"><span>'+t.name+'</span><span class="ac-count">'+t.post_count+'</span></div>';
        }).join('');
        box.classList.add('open');
        applyAcColors();
        box.querySelectorAll('.ac-item').forEach(function(el) {
          el.addEventListener('mousedown', function(e) { e.preventDefault(); pickAc(acItems[+el.dataset.i].name); });
        });
      } catch(e) { box.classList.remove('open'); }
    }, 250);
  });

  inp.addEventListener('keydown', function(e) {
    if (!box.classList.contains('open')) return;
    var items = box.querySelectorAll('.ac-item');
    if (e.key==='ArrowDown') { e.preventDefault(); acIdx=Math.min(acIdx+1,items.length-1); hi(items); }
    else if (e.key==='ArrowUp') { e.preventDefault(); acIdx=Math.max(acIdx-1,-1); hi(items); }
    else if (e.key==='Enter' && acIdx>=0) { e.preventDefault(); pickAc(acItems[acIdx].name); }
    else if (e.key==='Escape') box.classList.remove('open');
  });
  function hi(items) {
    items.forEach(function(el,i) { el.classList.toggle('selected', i===acIdx); });
    if (acIdx>=0) items[acIdx].scrollIntoView({block:'nearest'});
  }
  function pickAc(name) {
    var parts = inp.value.split(/\s+/);
    parts[parts.length-1] = name;
    inp.value = parts.join(' ') + ' ';
    box.classList.remove('open'); inp.focus();
  }
  document.addEventListener('click', function(e) { if (!e.target.closest('.search-wrap')) box.classList.remove('open'); });
});

function parsePost(p) {
  var tags = p.tags || {}, sc = p.score || {}, fi = p.file || {};
  return {
    id:p.id,
    file_url:fi.url||null, file_ext:fi.ext||'',
    file_size:fi.size||null, file_w:fi.width||null, file_h:fi.height||null,
    preview_url:(p.preview&&p.preview.url)||(p.sample&&p.sample.url)||null,
    sample_url:(p.sample&&p.sample.url)||fi.url||null,
    score:sc.total||0, fav_count:p.fav_count||0, rating:p.rating||'s',
    created_at:p.created_at||null,
    tags_artist:    tags.artist    ||[],
    tags_copyright: tags.copyright ||[],
    tags_character: tags.character ||[],
    tags_species:   tags.species   ||[],
    tags_general:   tags.general   ||[],
    tags_meta:      tags.meta      ||[],
    tags_all:(tags.artist||[]).concat(tags.copyright||[]).concat(tags.species||[]).concat(tags.general||[]),
  };
}
function fmtSize(b) { if (!b) return ''; return b>1048576?(b/1048576).toFixed(1)+'MB':Math.round(b/1024)+'KB'; }
function fmtDate(s) { if (!s) return ''; try { return new Date(s).toLocaleDateString('zh-CN'); } catch(e) { return s; } }

async function searchPosts(page) {
  page = page || 1; st.page = page;
  var tags = document.getElementById('searchInput').value.trim();
  var q = tags;
  if (st.ratings.length===1) q = (q?q+' ':'')+'rating:'+st.ratings[0];
  else if (st.ratings.length>=2) {
    var rp = st.ratings.map(function(r){return '~rating:'+r;}).join(' ');
    q = q?q+' '+rp:rp;
  }
  if (st.order) q = (q?q+' ':'')+'order:'+st.order;
  document.getElementById('browseGrid').innerHTML = '<div class="spinner"></div>';
  document.getElementById('browsePagination').innerHTML = '';
  try {
    var data = await apiFetch('/posts.json', { tags:q, limit:cfg.pageSize, page:page });
    var posts = (data.posts||[]).map(parsePost);
    renderGrid(posts, 'browseGrid');
    renderPagination('browsePagination', page, posts.length>=cfg.pageSize, searchPosts);
  } catch(e) {
    document.getElementById('browseGrid').innerHTML = '<div class="empty-state">加载失败：'+e.message+'</div>';
  }
}

var REC_NOISE = new Set(['flash','sound','video','animated','hi_res','absurd_res','digital_media_(artwork)',
  'conditional_dnp','tagme','4k','8k','high_resolution','traditional_media_(artwork)',
  'low_res','signature','watermark','text','english_text','dialogue','speech_bubble']);
var REC_GENDER = new Set(['male','female','intersex','ambiguous_gender','andromorph','gynomorph',
  'maleherm','herm','fem','masculine','feminine','cuntboy','dickgirl',
  'male/male','female/female','male/female','multiple_males','multiple_females','duo','trio','group','solo']);
var REC_GENITALS = new Set(['penis','vagina','balls','testicles','vulva','clitoris','anus','nipples','breasts',
  'butt','crotch','genitals','genital','nude','naked','clothed','bottomless','topless',
  'erection','flaccid','sheath','knot','cum_inside','internal','sperm']);
var REC_BEHAVIOR = ['vore','oral','anal','sex','cum','penetrat','moan','hump','lick','bite','suck',
  'bondage','bdsm','restrain','tied','dominat','submiss','feral',
  'young','cub','inflation','weight_gain','muscle','fat','macro','micro',
  'feet','paws','paw','smell','scent','sweat','armpit','belly','navel',
  'predator','prey','unbirth','digestion','soft_vore','hard_vore',
  'pillow','sleeping','dreaming','mind_control','hypno','petplay',
  'watersport','scat','diaper','musk','impregnation','breeding','oviposition'];
function isBehavior(t) {
  var l = t.toLowerCase();
  return REC_BEHAVIOR.some(function(w){return l.indexOf(w)!==-1;});
}
function getTagWeight(tag, type) {
  if (REC_NOISE.has(tag))    return 0;
  if (REC_GENDER.has(tag))   return 0.15;
  if (REC_GENITALS.has(tag)) return 0.4;
  if (type==='species')      return 3;
  if (isBehavior(tag))       return 2.5;
  if (type==='character')    return 1.5;
  return 1;
}
function addPrefsWeighted(post) {
  var p = getPrefs();
  function add(list, type) {
    list.forEach(function(t) {
      var w = getTagWeight(t, type);
      if (w > 0) p[t] = (p[t]||0) + w;
    });
  }
  add(post.tags_species,   'species');
  add(post.tags_character, 'character');
  add(post.tags_general,   'general');
  add(post.tags_artist,    'artist');
  add(post.tags_copyright, 'copyright');
  add(post.tags_meta,      'meta');
  localStorage.setItem('e621prefs', JSON.stringify(p));
}
async function loadRecommend() {
  var prefs = getPrefs();
  var sorted = Object.entries(prefs)
    .filter(function(kv){return !REC_NOISE.has(kv[0]);})
    .sort(function(a,b){return b[1]-a[1];});
  if (!sorted.length) {
    document.getElementById('prefBarWrap').innerHTML = '';
    document.getElementById('recommendGrid').innerHTML = '<div class="empty-state">暂无偏好数据，先浏览或收藏一些图片</div>';
    return;
  }
  var max = sorted[0][1];
  var bars = sorted.slice(0,16).map(function(kv) {
    return '<div class="pref-row"><div class="pref-name">'+kv[0]+'</div><div class="pref-track"><div class="pref-fill" style="width:'+Math.round(kv[1]/max*100)+'%"></div></div><div class="pref-count">'+kv[1].toFixed(1)+'</div></div>';
  }).join('');
  document.getElementById('prefBarWrap').innerHTML = '<div class="pref-bar-wrap"><div class="pref-bar-title">Tag 偏好（已加权，显示前 16）</div>'+bars+'</div>';
  var fresh = cfg.freshRatio/100;
  var topN = Math.max(3, Math.round((1-fresh)*6));
  var hot = sorted.slice(0,topN).map(function(kv){return kv[0];});
  var pool = sorted.slice(topN);
  var newTags = [];
  var cnt = Math.round(fresh*3);
  for (var i=0;i<cnt&&pool.length;i++) newTags.push(pool[Math.floor(Math.random()*pool.length)][0]);
  var final = [];
  hot.concat(newTags).forEach(function(t){if(!final.includes(t))final.push(t);});
  final = final.slice(0,6);
  document.getElementById('recSub').textContent = '基于 '+getHistory().length+' 条历史 / '+final.slice(0,3).join(', ')+'…';
  document.getElementById('recommendGrid').innerHTML = '<div class="spinner"></div>';
  try {
    var data = await apiFetch('/posts.json', { tags:final.join(' ')+' order:random', limit:cfg.pageSize });
    renderGrid((data.posts||[]).map(parsePost), 'recommendGrid');
    applyUIColors();
  } catch(e) {
    document.getElementById('recommendGrid').innerHTML = '<div class="empty-state">加载失败：'+e.message+'</div>';
  }
}

      +'<div class="post-footer"><span class="post-score">+'+(p.score||0)+'</span>'
      +'<button class="post-bkmk" data-bkmk="'+(bkmks.has(p.id)?'1':'0')+'" onclick="bkmkCard(event,'+p.id+')">'+(bkmks.has(p.id)?'<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"currentColor\" style=\"display:inline-block;vertical-align:middle;flex-shrink:0\"><path d=\"M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z\"/></svg>':'<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"currentColor\" style=\"display:inline-block;vertical-align:middle;flex-shrink:0\"><path d=\"M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2zm0 15l-5-2.18L7 18V5h10v13z\"/></svg>')+'</button>'
      +'</div></div>';
  }).join('');
  applyUIColors();
}

// ===== MODAL =====
function toggleTagGroup(id) {
  var el = document.getElementById(id);
  if (el) el.classList.toggle('collapsed');
}

async function openPost(postId) {
  window._currentPostId = postId;
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('modalMedia').innerHTML = '<div class="spinner" style="margin:40px auto"></div>';
  document.getElementById('modalMeta').innerHTML = '';
  document.getElementById('modalActions').innerHTML = '';
  document.getElementById('modalTags').innerHTML = '';
  document.getElementById('modalPostId').textContent = '#'+postId;
  applyModalColors();
  try {
    var post = window._cache[postId];
    if (!post) {
      var d = await apiFetch('/posts/'+postId+'.json');
      post = parsePost(d.post||d);
      window._cache[postId] = post;
    }
    addHistory(post);
    window._modalFileUrl    = post.file_url||'';
    window._modalPreviewUrl = post.preview_url||'';

    var isVid = post.file_ext==='webm'||post.file_ext==='mp4';
    var src   = post.sample_url||post.file_url;
    var mh = '';
    if (isVid && post.file_url)
      mh = '<video class="modal-video" controls loop><source src="'+post.file_url+'" type="video/'+post.file_ext+'"></video>';
    else if (src)
      mh = '<img class="modal-img" src="'+src+'" alt="'+postId+'" onclick="window.open(window._modalFileUrl,\'_blank\')" onerror="this.src=window._modalPreviewUrl">';
    else
      mh = '<div style="padding:40px;font-size:12px">无法加载</div>';
    document.getElementById('modalMedia').innerHTML = mh;

    var rMap = {s:'安全',q:'一般',e:'成人'};
    var mi = [
      {label:'评分', val:(post.score>=0?'+':'')+post.score},
      {label:'收藏', val:post.fav_count},
      {label:'评级', val:rMap[post.rating]||post.rating},
    ];
    if (post.created_at) mi.push({label:'上传',  val:fmtDate(post.created_at)});
    if (post.file_size)  mi.push({label:'大小',  val:fmtSize(post.file_size)});
    if (post.file_w&&post.file_h) mi.push({label:'分辨率', val:post.file_w+'x'+post.file_h});
    document.getElementById('modalMeta').innerHTML = mi.map(function(m) {
      return '<div class="meta-cell"><div class="meta-label">'+m.label+'</div><div class="meta-val">'+m.val+'</div></div>';
    }).join('');

    var isBk = getBookmarks().has(postId);
    var bkmkSvg = isBk ? '<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"currentColor\" style=\"display:inline-block;vertical-align:middle;flex-shrink:0\"><path d=\"M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z\"/></svg>' : '<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"currentColor\" style=\"display:inline-block;vertical-align:middle;flex-shrink:0\"><path d=\"M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2zm0 15l-5-2.18L7 18V5h10v13z\"/></svg>';
    document.getElementById('modalActions').innerHTML =
      '<button class="action-btn" onclick="votePost('+postId+',1)">↑ 点赞</button>'+
      '<button class="action-btn" onclick="votePost('+postId+',-1)">↓ 点踩</button>'+
      '<button class="action-btn" onclick="favPost(event,'+postId+')">♥ 收藏</button>'+
      '<button class="action-btn" id="actBkmk" onclick="toggleBookmarkModal()">'+(isBk?'<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"currentColor\" style=\"display:inline-block;vertical-align:middle;flex-shrink:0\"><path d=\"M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z\"/></svg>':'<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"currentColor\" style=\"display:inline-block;vertical-align:middle;flex-shrink:0\"><path d=\"M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2zm0 15l-5-2.18L7 18V5h10v13z\"/></svg>')+' 书签</button>'+
      (post.file_url?'<button class="action-btn" onclick="window.open(window._modalFileUrl,\'_blank\')">↗ 原图</button>':'')+
      '<button class="action-btn" onclick="window.open(\'https://e621.net/posts/'+postId+'\',\'_blank\')">⇗ 原帖</button>';

    window._modalTags = [];
    var groups = [
      {title:'Artist',    list:post.tags_artist,    cls:'artist'},
      {title:'Copyright', list:post.tags_copyright, cls:'copyright'},
      {title:'Character', list:post.tags_character, cls:'character'},
      {title:'Species',   list:post.tags_species,   cls:'species'},
      {title:'General',   list:post.tags_general,   cls:'general'},
      {title:'Meta',      list:post.tags_meta,      cls:'meta'},
    ].filter(function(g){return g.list.length>0;});

    document.getElementById('modalTags').innerHTML = groups.map(function(g) {
      var closed = (g.cls==='general'||g.cls==='meta')?' collapsed':'';
      var items = g.list.map(function(t) {
        var ti = window._modalTags.length;
        window._modalTags.push(t);
        return '<span class="tag '+g.cls+'" onclick="searchByTag(window._modalTags['+ti+'])">'+t+'</span>';
      }).join('');
      return '<div class="tag-group'+closed+'" id="tg-'+g.cls+'">'
        +'<div class="tag-group-header" onclick="toggleTagGroup(\'tg-'+g.cls+'\')">'
        +'<span>'+g.title+' <span style="opacity:0.35;font-size:9px">('+g.list.length+')</span></span>'
        +'<span class="tag-group-arrow">&#x25BE;</span>'
        +'</div>'
        +'<div class="tag-list">'+items+'</div>'
        +'</div>';
    }).join('');

    applyModalColors();
  } catch(e) {
    document.getElementById('modalMedia').innerHTML = '<div style="padding:30px;font-size:12px;color:#cc2222">加载失败：'+e.message+'</div>';
  }
}

function searchByTag(tag) {
  closeModal();
  // 重置排序为最新
  document.querySelectorAll('[data-order]').forEach(function(c){c.classList.remove('active');});
  var defOrder = document.querySelector('[data-order=""]');
  if (defOrder) defOrder.classList.add('active');
  st.order = '';
  document.getElementById('searchInput').value = tag;
  switchTab('browse');
  searchPosts();
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target===document.getElementById('modalOverlay')) closeModal(); }

// ===== NAV STATE (大返回：保存完整浏览状态) =====
var _navStack = [];

function captureState() {
  return {
    tab:     st.tab,
    search:  document.getElementById('searchInput') ? document.getElementById('searchInput').value : '',
    ratings: st.ratings.slice(),
    order:   st.order,
    page:    st.page,
    favPage: st.favPage,
    scroll:  window.scrollY,
  };
}

function pushNav(tab) {
  // 在切换前保存当前完整状态
  if (_navStack.length === 0 || _navStack[_navStack.length-1].tab !== tab) {
    _navStack.push(captureState());
    if (_navStack.length > 20) _navStack.shift();
  }
  updateBackBtn();
}

function goBack() {
  if (_navStack.length <= 1) return;
  _navStack.pop(); // 弹出当前
  var prev = _navStack[_navStack.length-1];
  if (!prev) return;
  // 恢复状态
  st.ratings = prev.ratings;
  st.order   = prev.order;
  st.page    = prev.page;
  st.favPage = prev.favPage;
  // 恢复搜索框
  if (document.getElementById('searchInput')) document.getElementById('searchInput').value = prev.search||'';
  // 恢复chips外观
  document.querySelectorAll('[data-rating]').forEach(function(el) {
    var r = el.dataset.rating;
    el.classList.toggle('active', prev.ratings.includes(r));
  });
  document.querySelectorAll('[data-order]').forEach(function(el) {
    el.classList.toggle('active', el.dataset.order === prev.order);
  });
  // 切换页面（不再push）
  _switchTabOnly(prev.tab);
  // 恢复内容
  if (prev.tab==='browse') searchPosts(prev.page);
  else if (prev.tab==='favorites') loadFavorites(prev.favPage);
  else if (prev.tab==='recommend') loadRecommend();
  else if (prev.tab==='history')   loadHistoryPage();
  else if (prev.tab==='bookmarks') loadBookmarksPage();
  else if (prev.tab==='settings')  updateStats();
  applyUIColors();
  updateBackBtn();
  // 恢复滚动位置
  setTimeout(function() { window.scrollTo(0, prev.scroll||0); }, 80);
}

function _switchTabOnly(tab) {
  st.tab = tab;
  var tabs = ['browse','recommend','favorites','bookmarks','history','settings'];
  tabs.forEach(function(t) {
    document.getElementById('page-'+t).style.display = t===tab?'block':'none';
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
}

function updateBackBtn() {
  var btn = document.getElementById('backBtn');
  if (btn) btn.classList.toggle('visible', _navStack.length > 1);
}

// ===== PAGINATION =====
var _pageCb = null;
function renderPagination(id, cur, hasNext, fn) {
  _pageCb = fn;
  var el = document.getElementById(id);
  var start = Math.max(1, cur-2);
  var end = cur+(hasNext?2:0);
  var html = '<button class="page-btn"'+(cur<=1?' disabled':' onclick="_pageCb('+(cur-1)+')"')+'>&#x2190;</button>';
  if (start>1) {
    html += '<button class="page-btn" onclick="_pageCb(1)">1</button>';
    if (start>2) html += '<span class="page-ell">…</span>';
  }
  for (var p=start;p<=end;p++)
    html += '<button class="page-btn'+(p===cur?' current':'') +'"'+(p!==cur?' onclick="_pageCb('+p+')"':'') +'>'+p+'</button>';
  html += '<button class="page-btn"'+(!hasNext?' disabled':' onclick="_pageCb('+(cur+1)+')"')+'>&#x2192;</button>';
  el.innerHTML = html;
  applyUIColors();
}

// ===== TABS =====
function switchTab(tab) {
  pushNav(tab);
  _switchTabOnly(tab);
  applyUIColors();
  if (tab==='recommend') loadRecommend();
  if (tab==='favorites') loadFavorites();
  if (tab==='bookmarks') loadBookmarksPage();
  if (tab==='history')   loadHistoryPage();
  if (tab==='settings')  updateStats();
}

// ===== TOAST =====
function showToast(msg) {
  var c = getC();
  var el = document.getElementById('toast');
  el.style.background = c.text; el.style.color = c.bg;
  el.textContent = msg; el.classList.add('show');
  clearTimeout(window._tt); window._tt = setTimeout(function(){el.classList.remove('show');}, 2000);
}

// ===== KEYBOARD =====
document.addEventListener('keydown', function(e) {
  if (e.key==='Escape') closeModal();
  if (e.key==='Enter' && document.activeElement && document.activeElement.id==='loginKey') doLogin();
});

tryAutoLogin();
